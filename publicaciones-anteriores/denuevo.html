<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080" />
    <title>Audio WAV Test</title>
    <style>
        body {
            width: 1080px;
            height: 1920px;
            margin: 0;
            overflow: hidden;
            display: grid;
            place-items: center;
            background: #0b1020;
            color: #e2e8f0;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 80px;
        }
    </style>
</head>

<body>
    <h1>SONIDO POR CÓDIGO (WAV)</h1>
    <script>
        const DURACION_MS = 6000;

        function makeToneBuffer(sampleRate, durationSec) {
            const length = Math.floor(sampleRate * durationSec);
            const data = new Float32Array(length);

            function addTone(freq, startSec, durSec, gain) {
                const start = Math.floor(startSec * sampleRate);
                const end = Math.min(length, Math.floor((startSec + durSec) * sampleRate));
                for (let i = start; i < end; i++) {
                    const t = i / sampleRate;
                    const envIn = Math.min(1, (i - start) / (sampleRate * 0.02));
                    const envOut = Math.min(1, (end - i) / (sampleRate * 0.04));
                    const env = Math.min(envIn, envOut);
                    data[i] += Math.sin(2 * Math.PI * freq * t) * gain * env;
                }
            }

            addTone(440, 0.2, 0.25, 0.22);
            addTone(660, 0.9, 0.25, 0.22);
            addTone(880, 1.6, 0.25, 0.22);
            addTone(740, 2.5, 0.25, 0.22);
            addTone(520, 3.4, 0.25, 0.22);
            addTone(980, 4.3, 0.25, 0.22);

            // soft clip
            for (let i = 0; i < data.length; i++) data[i] = Math.tanh(data[i]);
            return data;
        }

        function floatTo16BitPCM(view, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, input[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }

        function encodeWavMono(float32, sampleRate) {
            const buffer = new ArrayBuffer(44 + float32.length * 2);
            const view = new DataView(buffer);

            function writeString(off, str) {
                for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
            }

            writeString(0, "RIFF");
            view.setUint32(4, 36 + float32.length * 2, true);
            writeString(8, "WAVE");
            writeString(12, "fmt ");
            view.setUint32(16, 16, true);      // PCM chunk size
            view.setUint16(20, 1, true);       // PCM
            view.setUint16(22, 1, true);       // mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true); // byte rate
            view.setUint16(32, 2, true);       // block align
            view.setUint16(34, 16, true);      // bits per sample
            writeString(36, "data");
            view.setUint32(40, float32.length * 2, true);

            floatTo16BitPCM(view, 44, float32);
            return new Uint8Array(buffer);
        }

        function toBase64(bytes) {
            let bin = "";
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            return btoa(bin);
        }

        // optional local playback for preview
        function playInBrowser(float32, sampleRate) {
            const AC = window.AudioContext || window.webkitAudioContext;
            const ctx = new AC();
            const buf = ctx.createBuffer(1, float32.length, sampleRate);
            buf.copyToChannel(float32, 0);
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            ctx.resume().then(() => src.start());
        }

        const sampleRate = 44100;
        const durationSec = DURACION_MS / 1000;
        const mono = makeToneBuffer(sampleRate, durationSec);
        playInBrowser(mono, sampleRate);

        setTimeout(async () => {
            const wav = encodeWavMono(mono, sampleRate);
            const b64 = toBase64(wav);
            if (window.__gsdInjectAudio) {
                await window.__gsdInjectAudio({
                    base64: b64,
                    mime: "audio/wav"
                });
            }
            window.parent.postMessage({ type: "gsd:done" }, "*");
        }, DURACION_MS);
    </script>
</body>

</html>
